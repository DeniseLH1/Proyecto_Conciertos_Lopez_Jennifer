<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conciertos Conectados - Login</title>
    <link rel="stylesheet" href="css/concierto.css">
</head>
<body>
    <div class="main-container">
        <section class="login-card">
            <header class="header">
                <h1 class="title">Conciertos conectados</h1>
            </header>
            <img class="img" src="img/perfil.png" alt="" height="50%" width="50%">
            <form class="login-form">
                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="Ingrese su a correo electrónico" required>
                </div>
               
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingrese su contraseña" required>
                </div>

                <button type="submit" class="btn-login">Entrar</button>
            </form>
        </section>
    </div>
</body>
</html>
