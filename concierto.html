<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conciertos Conectados - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <section class="login-card">
            <header class="header">
                <h1 class="title">Conciertos <br> conectados</h1>
                <div class="icon-container">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="9"></circle>
                        <path d="M12 8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"></path>
                        <path d="M6 20a6 6 0 0 1 12 0"></path>
                        <circle cx="19" cy="5" r="3" stroke-dasharray="2 2"></circle>
                    </svg>
                </div>
            </header>

            <form class="login-form">
                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="Ingrese su a correo electrónico" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingrese su contraseña" required>
                </div>

                <button type="submit" class="btn-login">Entrar</button>
            </form>
        </section>
    </div>
</body>
</html>
