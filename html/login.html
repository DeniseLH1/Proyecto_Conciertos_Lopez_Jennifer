<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/favicon/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/img/favicon/favicon.svg" />
<link rel="shortcut icon" href="/img/favicon/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/img/favicon/apple-touch-icon.png" />
<link rel="manifest" href="../img/favicon//favicon-96x96.png" />
    <title>Tixy</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="main-container">
        <section class="login-card">
            <header class="header">
                <h1 class="title">Snooptick</h1>
            </header>
            <img class="img" src="img/perfil.png" alt="" height="30%" width="30%">
            <form class="login-form">
                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="Ingrese su a correo electrónico" required>
                </div>
               
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingrese su contraseña" required>
                </div>

                <button type="submit" class="btn-login">Entrar</button>
            </form>
        </section>
    </div>
</body>
</html>
