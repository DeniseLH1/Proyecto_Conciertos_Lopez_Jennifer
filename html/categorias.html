<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickyiyo - Categorías</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <script type="module" src="../js/categorias.js" defer></script>
</head>
<body>
    <header>
        <div class="header-top">
            <img src="../img/Ticket.png" height="80px">
            <h1 class="title">Tickyiyo -  Categorías</h1>
            <div class="header-controls">  
                <a href="../html/dashboard.html" class="btn-logout">Cerrar Sesión</a>
            </div>
        </div>
    </header>

    <main>
        <div class="featured-banner">
            <h2 class="banner-title">Gestión de Categorías</h2>
            <button id="btn-open-modal" class="btn-primary">+ Agregar Categoría</button>
        </div>

        <div id="category-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <h3 id="modal-title">Nueva Categoría</h3>
                <form id="category-form">
                    <input type="hidden" id="edit-id">
                    
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="cat-name" placeholder="Ej: Conciertos" required>
                    </div>
                    <div class="form-group" style="margin-top: 15px;">
                        <label>Descripción</label>
                        <textarea id="cat-desc" rows="3" placeholder="Descripción de la categoría..." required></textarea>
                    </div>
                    
                    <div class="form-actions" style="margin-top: 20px;">
                        <button type="submit" class="btn-save">Guardar</button>
                        <button type="button" id="btn-close-modal" class="btn-cancel">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <section class="table-section">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="categories-table-body">
                        </tbody>
                </table>
            </div>
        </section>
    </main>
</body>
</html>
