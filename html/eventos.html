<!DOCTYPE html>
<html lang=”es”>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login Tickyiyo">
    <meta name="description" content="HTML,css, pagina web, Tickyiyo">
    <meta name="description" content="Denise López">
    <meta name="description" content="Tickyiyo HTML">
    <meta name="generator" content="VScode">
    <link rel="icon" href="/img/favicon/favicon-96x96.png">
    <title>Tickyiyo – Eventos</title>
    <link rel="stylesheet" href="../css/eventos.css">
    <script src="../js/eventos.js" defer></script>
</head>
<body>
    <header>
        <div class="header-top">
            <img src="../img/Ticket.png" height="80px">
            <h1 class="title">Tickyiyo - Eventos</h1>
            <div class="header-controls">
                <a href="../html/dashboard.html" class="btn-logout">Regresar</a>
            </div>
        </div>
    </header>

    <main>
        <section>
            <h2>Gestión de Eventos</h2>
            <p>Administra la cartelera de espectáculos</p>
            <button id="btn-open-modal">+ Agregar Evento</button>
        </section>

        <div id="event-modal" style="display: none;">
            <div>
                <h3 id="modal-title">Registrar Evento</h3>
                <form id="event-form">
                    <input type="hidden" id="edit-id">

                    <div>
                        <label>Código</label>
                        <input type="text" id="ev-code" placeholder="Ej: EV-101" required>
                    </div>

                    <div>
                        <label>Nombre del Evento</label>
                        <input type="text" id="ev-name" placeholder="Ej: Rock al Parque" required>
                    </div>

                    <div>
                        <label>Categoría</label>
                        <select id="ev-category" required>
                            <option value="Conciertos">Conciertos</option>
                            <option value="Festivales">Festivales</option>
                            <option value="Teatro">Teatro</option>
                        </select>
                    </div>

                    <div>
                        <label>Precio ($)</label>
                        <input type="number" id="ev-price" placeholder="0.00" required>
                    </div>

                    <div>
                        <label>Fecha</label>
                        <input type="date" id="ev-date" required>
                    </div>

                    <div>
                        <label>Hora</label>
                        <input type="time" id="ev-time" required>
                    </div>

                    <div>
                        <label>Ciudad</label>
                        <select id="ev-city" required>
                            <option value="Bogotá">Bogotá</option>
                            <option value="Medellín">Medellín</option>
                            <option value="Bucaramanga">Bucaramanga</option>
                            <option value="Barranquilla">Barranquilla</option>
                        </select>
                    </div>

                    <div>
                        <label>URL Imagen</label>
                        <input type="url" id="ev-image" placeholder="https://ejemplo.com/imagen.jpg">
                    </div>

                    <div>
                        <label>Descripción</label>
                        <textarea id="ev-desc" rows="2"></textarea>
                    </div>

                    <div>
                        <button type="submit">Guardar Cambios</button>
                        <button type="button" id="btn-close-modal">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <section>
            <table border="1">
                <thead>
                    <tr>
                        <th>Vista</th>
                        <th>Código</th>
                        <th>Evento</th>
                        <th>Ciudad</th>
                        <th>Precio</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="events-table-body">
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
