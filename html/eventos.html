<!DOCTYPE html>
<html lang=”es”>
<head>
    <meta charset=”UTF-8”>
    <meta name=”viewport” content=”width=device-width, initial-scale=1.0”>
    <title>Tickyiyo – Gestión de Eventos</title>
    <link rel=”stylesheet” href=”../css/dashboard.css”>
    <script src=”../js/eventos.js” defer></script>
</head>
<body>
    <header>
        <div class=”header-top”>
            <img src=”../img/Ticket.png” alt=”Logo” height=”80px”>
            <h1 class=”title”>Tickyiyo – Eventos</h1>
            <div class=”header-controls”>
                <a href=”../Tickyiyo.html” class=”btn-logout”>Cerrar Sesión</a>
            </div>
        </div>
        <nav>
            <ul class=”header-nav”>
                <li class=”nav-item”><a href=”categorias.html”>Categorías</a></li>
                <li class=”nav-item”><a href=”eventos.html” class=”active”>Eventos</a></li>
                <li class=”nav-item”><a href=”ventas.html”>Ventas</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class=”featured-banner”>
            <h2 class=”banner-title”>Gestión de Eventos</h2>
            <p>Administra la cartelera de espectáculos</p>
            <button id=”btn-open-modal” class=”btn-primary”>+ Agregar Evento</button>
        </div>

        <div id=”event-modal” class=”modal-overlay” style=”display: none;”>
            <div class=”modal-content”>
                <h3 id=”modal-title”>Registrar Evento</h3>
                <form id=”event-form”>
                    <input type=”hidden” id=”edit-id”>
                    
                    <div class=”form-grid”>
                        <div class=”form-group”>
                            <label>Código</label>
                            <input type=”text” id=”ev-code” placeholder=”Ej: EV-101” required>
                        </div>
                        <div class=”form-group”>
                            <label>Nombre del Evento</label>
                            <input type=”text” id=”ev-name” placeholder=”Ej: Rock al Parque” required>
                        </div>
                        <div class=”form-group”>
                            <label>Categoría</label>
                            <select id=”ev-category” required>
                                </select>
                        </div>
                        <div class=”form-group”>
                            <label>Precio ($)</label>
                            <input type=”number” id=”ev-price” placeholder=”0.00” required>
                        </div>
                        <div class=”form-group”>
                            <label>Fecha</label>
                            <input type=”date” id=”ev-date” required>
                        </div>
                        <div class=”form-group”>
                            <label>Hora</label>
                            <input type=”time” id=”ev-time” required>
                        </div>
                        <div class=”form-group”>
                            <label>Ciudad</label>
                            <select id=”ev-city”>
                                <option value=”Barranquilla”>Barranquilla</option>
                                <option value=”Bogotá”>Bogotá</option>
                                <option value=”Bucaramanga”>Bucaramanga</option>
                                <option value=”Medellín”>Medellín</option>
                            </select>
                        </div>
                        <div class=”form-group”>
                            <label>URL Imagen</label>
                            <input type=”url” id=”ev-image” placeholder=https://imagen.jpg>
                        </div>
                        <div class=”form-group full-width”>
                            <label>Descripción Breve</label>
                            <textarea id=”ev-desc” rows=”2” placeholder=”Cuéntanos sobre el evento…”></textarea>
                        </div>
                    </div>
                    
                    <div class=”form-actions”>
                        <button type=”submit” class=”btn-save”>Guardar Cambios</button>
                        <button type=”button” id=”btn-close-modal” class=”btn-cancel”>Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <section class=”table-section”>
            <div class=”table-responsive”>
                <table>
                    <thead>
                        <tr>
                            <th>Vista</th>
                            <th>Código</th>
                            <th>Evento</th>
                            <th>Ciudad</th>
                            <th>Precio</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id=”events-table-body”>
                        </tbody>
                </table>
            </div>
        </section>
    </main>
</body>
</html>
