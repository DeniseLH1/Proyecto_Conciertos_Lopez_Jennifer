<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login Tickyiyo">
    <meta name="description" content="HTML,css, pagina web, Tickyiyo">
    <meta name="description" content="Denise López">
    <meta name="description" content="Tickyiyo HTML">
    <meta name="generator" content="VScode">
    <link rel="icon" href="/img/favicon/favicon-96x96.png">
    <title>Tickyiyo</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/usuario.css"> <script src="../js/usuario.js" defer></script>
</head>
<body>
    <header>
        <div class="header-top">
            <h1 class="header-title">Conciertos Conectados</h1>
            <div class="header-controls">
                <div class="search-bar">
                    <input type="text" id="input-busqueda" placeholder="Buscar artista o evento...">
                    <span class="search-icon">🔍</span>
                </div>
                <div class="cart-container" onclick="abrirCarrito()">
                    <span class="cart-icon">🛒</span>
                    <span id="contador-carrito" class="cart-badge">0</span>
                </div>
            </div>
        </div>
        
        <nav class="filter-bar">
            <div class="filter-group">
                <label>Ciudad:</label>
                <select id="filtro-ciudad">
                    <option value="">Todas</option>
                    <option value="Bogotá">Bogotá</option>
                    <option value="Medellín">Medellín</option>
                    <option value="Barranquilla">Barranquilla</option>
                    <option value="Bucaramanga">Bucaramanga</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Categoría:</label>
                <select id="filtro-categoria">
                    <option value="">Todas</option>
                    </select>
            </div>
        </nav>
    </header>

    <main>
        <div class="featured-banner">
            <h2 class="banner-title">Eventos Destacados</h2>
            <p style="color: #666;">Selecciona tus entradas para los mejores conciertos</p>
        </div>

        <div id="contenedor-eventos" class="events-grid">
            </div>

        <div id="modal-detalle" class="modal-overlay" style="display: none;">
            <div class="modal-content detalle-expandido">
                <button class="btn-regresar" onclick="cerrarDetalle()">← Regresar a la cartelera</button>
                <div id="contenido-detalle" class="detalle-grid">
                    </div>
            </div>
        </div>

        <div id="modal-carrito" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <h3 class="modal-header">Tu Carrito de Compras 🛒</h3>
                <div id="lista-carrito" class="carrito-items-lista">
                    </div>
                <div class="total-seccion">
                    <strong>Total a pagar:</strong>
                    <span id="precio-total" class="total-monto">$0</span>
                </div>
                
                <hr class="divisor">

                <form id="form-compra" class="form-finalizar">
                    <h4>Datos para tu Factura</h4>
                    <div class="form-grid-cliente">
                        <input type="text" id="c-id" placeholder="Cédula / ID" required>
                        <input type="text" id="c-nombre" placeholder="Nombre Completo" required>
                        <input type="text" id="c-dir" placeholder="Dirección de Residencia" required>
                        <input type="tel" id="c-tel" placeholder="Teléfono de Contacto" required>
                        <input type="email" id="c-email" placeholder="Correo Electrónico" required>
                    </div>
                    <div class="form-actions-carrito">
                        <button type="submit" class="btn-save">Confirmar y Comprar</button>
                        <button type="button" class="btn-cancel" onclick="cerrarCarrito()">Seguir Comprando</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-icon-config">
            <a href="../html/login.html" style="text-decoration: none;"><img src="../img/trabajando.png" alt=""></a>
        </div>
    </footer>

</body>
</html>
