<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login Tickyiyo">
    <meta name="description" content="HTML,css, pagina web, Tickyiyo">
    <meta name="description" content="Denise López">
    <meta name="description" content="Tickyiyo HTML">
    <meta name="generator" content="VScode">
    <link rel="icon" href="/img/favicon/favicon-96x96.png">
    <title>Tickyiyo</title>
    <link rel="stylesheet" href="../css/usuario.css"> <script src="../js/usuario.js" defer></script>
</head>
<body>
    <header>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <div class="header-top">
            <img src="../img/Ticket.png" height="100px" alt="Logo Tickyiyo">
            <h1 class="title">Tickyiyo </h1>
            <div class="header-controls">
         <div class="search-bar">
                    <input type="text" id="input-busqueda" class="search-input" placeholder="Buscar artista">
                    <span class="search-icon">🔍</span>
                </div>
                <div class="cart-container" onclick="abrirCarrito()">
                    <span class="cart-icon">🛒</span>
                    <span id="contador-carrito" class="cart-badge">0</span>
                </div>
            </div>
        </div>
        
        <nav class="filter-bar">
            <div class="filter-group">
                <label>Ciudad:</label>
                <select id="filtro-ciudad">
                    <option value="">Todas</option>
                    <option value="Bogotá">Bogotá</option>
                    <option value="Medellín">Medellín</option>
                    <option value="Barranquilla">Barranquilla</option>
                    <option value="Bucaramanga">Bucaramanga</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Categoría:</label>
                <select id="filtro-categoria">
                    <option value="">Todas las Categorías</option>
                    </select>
            </div>
        </nav>
    </header>

    <main>

        <div id="contenedor-eventos" class="events-grid"></div>

        <div id="modal-detalle" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <button class="btn-regresar" onclick="cerrarDetalle()">← Regresar</button>
                <div id="contenido-detalle"></div>
            </div>
        </div>

        <div id="modal-carrito" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <h3 style="margin-bottom: 20px;">Tu Carrito 🛒</h3>
                <div id="lista-carrito"></div>
                
                <div class="total-seccion">
                    <strong>Total:</strong> <span id="precio-total">$0</span>
                </div>

                <form id="form-compra">
                    <h4>Datos del Comprador</h4>
                    <div class="form-grid-cliente">
                        <input type="text" id="c-id" placeholder="Identificación" required>
                        <input type="text" id="c-nombre" placeholder="Nombre Completo" required>
                        <input type="text" id="c-dir" placeholder="Dirección" required>
                        <input type="tel" id="c-tel" placeholder="Teléfono" required>
                        <input type="email" id="c-email" placeholder="E-mail" required>
                    </div>
                    
                    <div class="form-actions-carrito" style="margin-top: 20px;">
                        <button type="submit" class="btn-save">Finalizar Compra</button>
                        <button type="button" class="btn-cancel-all" onclick="cancelarCompra()">Cancelar y Vaciar</button>
                        <button type="button" class="btn-cancel" onclick="cerrarCarrito()">Cerrar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-icon-config">
            <a href="../html/login.html" style="text-decoration: none;"><img src="../img/trabajando.png" alt=""></a>
        </div>
    </footer>

</body>
</html>
